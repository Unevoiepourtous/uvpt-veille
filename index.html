<!-- UVPT — Veille AAP v2 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --ink: #0f0f0e;
    --ink-soft: #2a2a28;
    --paper: #f5f1ea;
    --paper-warm: #ebe5d9;
    --line: #c8c0b0;
    --line-soft: #d9d1c0;
    --accent: #b8341a;
    --accent-deep: #8a1f0a;
    --gold: #b08840;
    --green: #2d5a3d;
    --blue: #1e3a5f;
    --muted: #6b6557;
    --shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px -8px rgba(15,15,14,.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: var(--paper-warm);
    border-right: 1px solid var(--line);
    padding: 28px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .brand span { color: var(--accent); }
  .brand-sub {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .stat-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stat {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    padding: 10px 12px;
    border-radius: 2px;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }
  .stat-num.urgent { color: var(--accent); }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 4px;
  }

  .filter-group { margin-bottom: 22px; }
  .filter-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .filter-title button {
    background: none;
    border: none;
    font-size: 9px;
    color: var(--accent);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .search-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-family: inherit;
    font-size: 13px;
    border-radius: 2px;
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--ink); }

  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    font-size: 11px;
    padding: 5px 10px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 100px;
    cursor: pointer;
    transition: all .12s;
    user-select: none;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--ink); }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .radio-list { display: flex; flex-direction: column; gap: 4px; }
  .radio-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 2px;
    font-size: 13px;
    transition: background .12s;
  }
  .radio-item:hover { background: rgba(0,0,0,.04); }
  .radio-item input { accent-color: var(--accent); }
  .radio-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ============ MAIN ============ */
  .main { padding: 32px 40px; max-width: 100%; min-width: 0; }

  .topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 4px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
  }
  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .topbar-actions { display: flex; gap: 8px; }
  .btn {
    padding: 8px 14px;
    border: 1px solid var(--ink);
    background: var(--paper);
    font-family: inherit;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all .12s;
    font-weight: 500;
    border-radius: 2px;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn.accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .btn.accent:hover { background: var(--accent-deep); border-color: var(--accent-deep); }

  .meta-line {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .meta-line .dot { width: 4px; height: 4px; background: var(--muted); border-radius: 50%; }
  .sort-select {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 4px 8px;
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 2px;
  }

  /* ============ AAP LIST ============ */
  .aap-list {
    display: flex;
    flex-direction: column;
  }
  .aap-row {
    display: grid;
    grid-template-columns: 80px 1fr 180px 120px 100px;
    gap: 20px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background .12s;
    align-items: start;
  }
  .aap-row:hover { background: rgba(0,0,0,.025); }
  .aap-row.selected {
    background: rgba(184,52,26,.05);
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin-left: -19px;
  }

  .aap-score {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 600;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }
  .aap-score-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 600;
  }
  .aap-score.high { color: var(--green); }
  .aap-score.med { color: var(--gold); }
  .aap-score.low { color: var(--muted); }

  .aap-headline {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .aap-funder {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .aap-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    background: var(--paper-warm);
    border: 1px solid var(--line-soft);
    border-radius: 100px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .tag.type-public { background: #e8eef5; border-color: #c5d4e5; color: var(--blue); }
  .tag.type-prive { background: #f5ebe8; border-color: #e5cdc5; color: var(--accent-deep); }

  .aap-funding {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }
  .aap-funding-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 2px;
  }

  .aap-deadline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .aap-deadline-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 2px;
  }
  .aap-days {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
  }
  .aap-days.urgent { background: var(--accent); color: var(--paper); }
  .aap-days.soon { background: var(--gold); color: var(--paper); }
  .aap-days.normal { background: var(--paper-warm); color: var(--muted); border: 1px solid var(--line-soft); }
  .aap-days.passed { background: #ddd; color: #888; text-decoration: line-through; }

  .aap-status-cell { display: flex; align-items: center; }
  .status-pill {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .status-todo { background: var(--paper-warm); color: var(--muted); border-color: var(--line); }
  .status-progress { background: #fff8e6; color: var(--gold); border-color: #e8d4a0; }
  .status-submitted { background: #e6f0ea; color: var(--green); border-color: #b5d4be; }
  .status-rejected { background: #f5e8e5; color: var(--accent); border-color: #e0c0b8; }
  .status-won { background: var(--green); color: var(--paper); border-color: var(--green); }

  /* ============ DETAIL DRAWER ============ */
  .drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,15,14,.4);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 720px;
    max-width: 95vw;
    background: var(--paper);
    z-index: 51;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
    box-shadow: -20px 0 60px -20px rgba(0,0,0,.2);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    padding: 24px 36px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-warm);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .drawer-close {
    background: none;
    border: 1px solid var(--ink);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .drawer-close:hover { background: var(--ink); color: var(--paper); }
  .drawer-eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .drawer-title {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .drawer-funder {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 0;
  }
  .drawer-funder strong { font-weight: 600; }

  .drawer-body { padding: 28px 36px 60px; }

  .key-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
    padding: 18px 20px;
    background: var(--paper-warm);
    border: 1px solid var(--line-soft);
    border-radius: 2px;
  }
  .key-item .k-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .key-item .k-value {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.2;
  }
  .key-item.full { grid-column: 1 / -1; }

  .section { margin-bottom: 32px; }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--ink);
    color: var(--paper);
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 500;
  }
  .section-body { font-size: 14px; line-height: 1.65; color: var(--ink-soft); }
  .section-body p { margin: 0 0 12px; }
  .section-body ul { margin: 0; padding-left: 18px; }
  .section-body li { margin-bottom: 6px; }

  .ai-block {
    background: linear-gradient(180deg, var(--paper-warm) 0%, var(--paper) 100%);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 18px 20px;
    border-radius: 2px;
    margin-bottom: 14px;
    position: relative;
  }
  .ai-block-tag {
    position: absolute;
    top: -10px;
    left: 16px;
    font-size: 9px;
    background: var(--accent);
    color: var(--paper);
    padding: 3px 8px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
    border-radius: 2px;
  }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
  .ai-loading::before {
    content: '';
    width: 12px; height: 12px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pitch-box {
    background: var(--ink);
    color: var(--paper);
    padding: 22px 24px;
    border-radius: 2px;
    margin-bottom: 14px;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.55;
    position: relative;
  }
  .pitch-box::before {
    content: '« ';
    font-size: 40px;
    position: absolute;
    top: 0px;
    left: 8px;
    color: var(--accent);
    font-weight: 700;
    line-height: 1;
  }
  .pitch-box-content { padding-left: 24px; }

  .checklist {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line-soft);
    font-size: 13px;
  }
  .checklist li:last-child { border-bottom: none; }
  .checklist input { margin-top: 3px; accent-color: var(--accent); }

  .angle-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .angle-item {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    padding: 14px 16px;
    border-radius: 2px;
  }
  .angle-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
  }
  .angle-title {
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 14px;
  }
  .angle-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .drawer-actions {
    position: sticky;
    bottom: 0;
    background: var(--paper);
    border-top: 1px solid var(--line);
    padding: 14px 36px;
    display: flex;
    gap: 8px;
    margin: 0 -36px -60px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 8px;
    color: var(--ink);
  }

  /* Status dropdown */
  .status-menu {
    position: absolute;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 2px;
    box-shadow: var(--shadow);
    z-index: 60;
    min-width: 160px;
    overflow: hidden;
  }
  .status-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-menu button:hover { background: var(--paper-warm); }

  /* ============ API KEY GATE ============ */
  .gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--paper);
  }
  .gate-card {
    max-width: 520px;
    width: 100%;
    background: var(--paper-warm);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px;
    box-shadow: var(--shadow);
  }
  .gate-eyebrow {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent-deep);
    background: #f0d8a0;
    padding: 6px 12px;
    border-radius: 100px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .gate-title {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .gate-desc {
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 24px;
  }
  .gate-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: block;
  }
  .gate-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border-radius: 2px;
    outline: none;
    margin-bottom: 16px;
  }
  .gate-input:focus { border-color: var(--ink); }
  .gate-button {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 2px;
    transition: background .15s;
  }
  .gate-button:hover { background: var(--accent); }
  .gate-button:disabled { opacity: 0.4; cursor: not-allowed; }
  .gate-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 18px;
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 2px;
  }
  .gate-note a { color: var(--accent); text-decoration: none; font-weight: 600; }

  .api-status {
    position: fixed;
    bottom: 12px;
    left: 12px;
    z-index: 40;
    background: var(--paper-warm);
    border: 1px solid var(--line);
    padding: 6px 10px;
    border-radius: 100px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    font-family: 'Inter Tight', sans-serif;
  }
  .api-status:hover { background: var(--ink); color: var(--paper); }

  /* ============ AI DISCOVERY ============ */
  .discovery-status {
    background: var(--paper-warm);
    border: 1px solid var(--accent);
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--ink-soft);
    border-radius: 2px;
    animation: slideDown .3s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .ai-badge {
    display: inline-block;
    margin-left: 8px;
    font-size: 9px;
    padding: 2px 7px;
    background: var(--accent);
    color: var(--paper);
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    font-family: 'Inter Tight', sans-serif;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.accent:disabled:hover { background: var(--accent); border-color: var(--accent); }

  // ================== STORAGE (localStorage for Vercel) ==================
  async function getStored(key, fallback) {
    try {
      const r = localStorage.getItem(key);
      return r ? JSON.parse(r) : fallback;
    } catch { return fallback; }
  }
  async function setStored(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }

  // ================== FORMAT HELPERS ==================
  const fmtDate = (d) => new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
  const daysUntil = (d) => Math.ceil((new Date(d) - new Date()) / (1000 * 60 * 60 * 24));
  const dayClass = (d) => {
    const n = daysUntil(d);
    if (n < 0) return 'passed';
    if (n <= 14) return 'urgent';
    if (n <= 45) return 'soon';
    return 'normal';
  };
  const dayLabel = (d) => {
    const n = daysUntil(d);
    if (n < 0) return `${Math.abs(n)} j passés`;
    if (n === 0) return "Aujourd'hui";
    return `J−${n}`;
  };

                          h('div', { className: 'angle-title' },
                            h('span', { className: 'angle-num' }, `${i + 1}.`), angle.title),
                          h('div', { className: 'angle-desc' }, angle.desc))))
                  : h('div', { className: 'ai-block' },
                      h('div', { className: 'ai-loading' }, 'Génération des angles…'))),

              // ============ AI BLOCK : PITCH ============
              h('div', { className: 'section' },
                h('div', { className: 'section-title' },
                  h('span', { className: 'num' }, '06'), 'Brouillon de pitch'),
                ai
                  ? h('div', null,
                      h('div', { className: 'pitch-box' },
                        h('div', { className: 'pitch-box-content' }, ai.pitch)),
                      h('button', {
                        className: 'btn',
                        onClick: () => navigator.clipboard.writeText(ai.pitch)
                      }, 'Copier le pitch'))
                  : h('div', { className: 'ai-block' },
                      h('div', { className: 'ai-loading' }, 'Rédaction du pitch…'))),

              // ============ CHECKLIST ============
              h('div', { className: 'section' },
                h('div', { className: 'section-title' },
                  h('span', { className: 'num' }, '07'), 'Pièces à fournir'),
                h('ul', { className: 'checklist' },
                  a.pieces.map((p, i) =>
                    h('li', { key: i },
                      h('input', {
                        type: 'checkbox',
                        checked: !!checklist[`${a.id}:${i}`],
                        onChange: e => updateChecklist(a.id, i, e.target.checked)
                      }),
                      h('span', null, p))))),

              // ============ AI BLOCK : RED FLAGS ============
              ai && ai.redFlags ? h('div', { className: 'section' },
                h('div', { className: 'section-title' },
                  h('span', { className: 'num' }, '08'), 'Points de vigilance'),
                h('div', { className: 'ai-block' },
                  h('span', { className: 'ai-block-tag' }, 'IA'),
                  h('div', { className: 'section-body', style: { margin: 0 } },
                    h('p', null, ai.redFlags)))) : null,

              h('div', { className: 'drawer-actions' },
                h('button', { className: 'btn primary', onClick: () => window.open(a.url, '_blank') }, 'Page officielle ↗'),
                a.isAiDiscovered ? h('button', {
                  className: 'btn',
                  onClick: () => {
                    if (confirm('Supprimer cet AAP de ta base ?')) removeDiscoveredAap(a.id);
                  },
                  title: 'Supprimer cet AAP IA'
                }, '🗑 Supprimer') : null,
                ai
                  ? h('button', {
                      className: 'btn',
                      onClick: () => {
                        const next = { ...aiAnalysis };
                        delete next[a.id];
                        setAiAnalysis(next);
                        setStored('uvpt:ai-cache', next);
                        runAiAnalysis(a);
                      }
                    }, 'Régénérer l\'analyse')
                  : null,
                h('button', {
                  className: 'btn accent',
                  onClick: () => updateStatus(a.id, st === 'progress' ? 'todo' : 'progress')
                }, st === 'progress' ? 'Mettre en pause' : 'Démarrer la candidature'))
            ));
        })()
      )
    );
  }

  createRoot(document.getElementById('root')).render(h(App));
</script>
